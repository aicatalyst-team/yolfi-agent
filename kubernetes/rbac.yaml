apiVersion: v1
kind: ServiceAccount
metadata:
  name: mcp-test-runner
  namespace: poc-yolfi-agent
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: configmap-writer
  namespace: poc-yolfi-agent
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["create", "update", "patch", "get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mcp-test-runner-cm-writer
  namespace: poc-yolfi-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: configmap-writer
subjects:
  - kind: ServiceAccount
    name: mcp-test-runner
    namespace: poc-yolfi-agent
